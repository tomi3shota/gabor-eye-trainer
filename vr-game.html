<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ガボールパッチ・アイ・トレーナー - VR プレイ中</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        #vr-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* フルスクリーン/開始前のオーバーレイ */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 20, 30, 0.95);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }
        #start-overlay h1 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        #start-overlay p {
            max-width: 420px;
            line-height: 1.6;
        }
        #enter-vr-btn {
            margin-top: 20px;
            padding: 16px 32px;
            font-size: 1.1em;
            background: #6f42c1;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #enter-vr-btn:active {
            background: #59339d;
        }
        #exit-vr-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 0.85em;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>🥽 VRモード準備完了</h1>
        <p>スマホを横向きにして「VR開始」をタップすると全画面のステレオ表示になります。<br>
        タップ後、スマホをカードボードゴーグルにセットしてください。</p>
        <p id="difficulty-preview" style="font-weight:bold;"></p>
        <button id="enter-vr-btn">▶ VR開始</button>
    </div>

    <a id="exit-vr-btn" href="vr-index.html">✕ 終了</a>

    <canvas id="vr-canvas"></canvas>

    <script src="auth.js"></script>
    <script>requireLogin();</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="gabor-canvas.js"></script>
    <script src="score-export.js"></script>
    <script src="vr-script.js"></script>
</body>
</html>
